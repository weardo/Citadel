<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480">
  <defs>
    <linearGradient id="rf-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="rf-top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#3a7bd5"/>
    </linearGradient>
    <filter id="rf-g1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .rf-mono { font-family: 'SF Mono','Cascadia Code','Consolas',monospace; }
      .rf-sans { font-family: 'Segoe UI',system-ui,sans-serif; }

      /* Particle: travels from start of row (x≈450) to end (x≈1150), delta=700px */
      @keyframes rf-p {
        0%   { opacity: 0; transform: translateX(0); }
        2%   { opacity: 1; transform: translateX(0); }
        22%  { opacity: 1; transform: translateX(700px); }
        24%  { opacity: 0; transform: translateX(700px); }
        100% { opacity: 0; transform: translateX(0); }
      }
      /* Glow ring expands when particle arrives (~22%) */
      @keyframes rf-ring {
        0%, 19%   { opacity: 0; r: 28; }
        21%  { opacity: 0.6; r: 28; }
        24%  { opacity: 0.4; r: 44; }
        28%  { opacity: 0; r: 56; }
        100% { opacity: 0; r: 56; }
      }

      .rf-p1 { animation: rf-p 8s linear 0s infinite both; }
      .rf-p2 { animation: rf-p 8s linear 2s infinite both; }
      .rf-p3 { animation: rf-p 8s linear 4s infinite both; }
      .rf-p4 { animation: rf-p 8s linear 6s infinite both; }

      .rf-r1 { animation: rf-ring 8s linear 0s infinite both; }
      .rf-r2 { animation: rf-ring 8s linear 2s infinite both; }
      .rf-r3 { animation: rf-ring 8s linear 4s infinite both; }
      .rf-r4 { animation: rf-ring 8s linear 6s infinite both; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" rx="14" fill="url(#rf-bg)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="478.5" rx="14" fill="none" stroke="#00d2ff" stroke-width="1.5" stroke-opacity="0.2"/>
  <rect x="30" y="11" width="1140" height="2.5" rx="1.25" fill="url(#rf-top)" opacity="0.6"/>

  <!-- ── HEADER ── -->
  <text x="48" y="48" class="rf-sans" font-size="18" font-weight="700" fill="#e6edf3" letter-spacing="4">CITADEL</text>
  <text x="152" y="48" class="rf-mono" font-size="11" fill="#00d2ff" opacity="0.65" letter-spacing="2">/ INTENT ROUTER</text>
  <text x="1152" y="48" class="rf-sans" font-size="12" fill="#8b949e" text-anchor="end" font-style="italic">Say what you want. /do routes it.</text>

  <!-- Column headers -->
  <text x="48" y="74" class="rf-sans" font-size="10" fill="#4a5568" letter-spacing="2" font-weight="600">YOU TYPE</text>
  <text x="552" y="74" class="rf-sans" font-size="10" fill="#4a5568" letter-spacing="2" font-weight="600" text-anchor="middle">TIER MATCHED</text>
  <text x="900" y="74" class="rf-sans" font-size="10" fill="#4a5568" letter-spacing="2" font-weight="600" text-anchor="middle">CITADEL RUNS</text>

  <!-- Header divider -->
  <line x1="30" y1="84" x2="1170" y2="84" stroke="#21262d" stroke-width="1.5"/>

  <!-- Column dividers (subtle) -->
  <line x1="452" y1="84" x2="452" y2="462" stroke="#21262d" stroke-width="1"/>
  <line x1="654" y1="84" x2="654" y2="462" stroke="#21262d" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 1 — green — Tier 0 — Direct Edit -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="86" width="1140" height="92" rx="0" fill="#1c2820" fill-opacity="0.5"/>

  <!-- Command -->
  <text x="48" y="122" class="rf-mono" font-size="15" fill="#79c0ff">"fix the typo on line 42"</text>
  <text x="48" y="143" class="rf-mono" font-size="10" fill="#3fb950" opacity="0.85">pattern: "fix typo in X"  ·  ~0 tokens  ·  &lt;1ms</text>
  <text x="48" y="160" class="rf-sans" font-size="10" fill="#8b949e" opacity="0.6">Regex on raw input. No model call needed.</text>

  <!-- Arrow into tier -->
  <line x1="452" y1="130" x2="468" y2="130" stroke="#3fb950" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <polygon points="464,126 474,130 464,134" fill="#3fb950" opacity="0.6"/>

  <!-- Tier box -->
  <rect x="476" y="108" width="166" height="44" rx="8" fill="#0e1f0e" stroke="#3fb950" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="559" y="126" class="rf-sans" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="700" letter-spacing="2">TIER 0</text>
  <text x="559" y="142" class="rf-sans" font-size="10" fill="#3fb950" text-anchor="middle" opacity="0.7">Pattern Match</text>

  <!-- Arrow into output -->
  <line x1="642" y1="130" x2="658" y2="130" stroke="#3fb950" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <polygon points="654,126 664,130 654,134" fill="#3fb950" opacity="0.6"/>

  <!-- Output box -->
  <rect x="666" y="104" width="260" height="52" rx="8" fill="#0e1f0e" stroke="#3fb950" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="684" y="126" class="rf-sans" font-size="15" fill="#3fb950" font-weight="600">✎  Direct Edit</text>
  <text x="684" y="145" class="rf-sans" font-size="10" fill="#3fb950" opacity="0.65">zero overhead · no skill loaded</text>

  <!-- Animated particle (CSS) -->
  <circle class="rf-p1" cx="452" cy="130" r="5" fill="#3fb950" filter="url(#rf-g1)" opacity="0"/>
  <!-- Glow ring on output arrival -->
  <circle class="rf-r1" cx="796" cy="130" r="28" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0"/>


  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 2 — blue — Tier 2 — /review -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="178" width="1140" height="92" rx="0" fill="#1a1f2e" fill-opacity="0.4"/>

  <text x="48" y="214" class="rf-mono" font-size="15" fill="#79c0ff">"review the auth module"</text>
  <text x="48" y="235" class="rf-mono" font-size="10" fill="#58a6ff" opacity="0.85">keyword: "review"  ·  ~0 tokens  ·  keyword table hit</text>
  <text x="48" y="252" class="rf-sans" font-size="10" fill="#8b949e" opacity="0.6">Matched against installed skill keyword table. No LLM needed.</text>

  <line x1="452" y1="222" x2="468" y2="222" stroke="#58a6ff" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <polygon points="464,218 474,222 464,226" fill="#58a6ff" opacity="0.6"/>

  <rect x="476" y="200" width="166" height="44" rx="8" fill="#0e1219" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="559" y="218" class="rf-sans" font-size="11" fill="#58a6ff" text-anchor="middle" font-weight="700" letter-spacing="2">TIER 2</text>
  <text x="559" y="234" class="rf-sans" font-size="10" fill="#58a6ff" text-anchor="middle" opacity="0.7">Keyword Match</text>

  <line x1="642" y1="222" x2="658" y2="222" stroke="#58a6ff" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <polygon points="654,218 664,222 654,226" fill="#58a6ff" opacity="0.6"/>

  <rect x="666" y="196" width="260" height="52" rx="8" fill="#0e1219" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="684" y="218" class="rf-sans" font-size="15" fill="#58a6ff" font-weight="600">◆  /review</text>
  <text x="684" y="237" class="rf-sans" font-size="10" fill="#58a6ff" opacity="0.65">5-pass structured code review</text>

  <circle class="rf-p2" cx="452" cy="222" r="5" fill="#58a6ff" filter="url(#rf-g1)" opacity="0"/>
  <circle class="rf-r2" cx="796" cy="222" r="28" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0"/>


  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 3 — orange — Tier 3 — /archon -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="270" width="1140" height="92" rx="0" fill="#231a0e" fill-opacity="0.4"/>

  <text x="48" y="306" class="rf-mono" font-size="15" fill="#79c0ff">"build me a recipe app"</text>
  <text x="48" y="327" class="rf-mono" font-size="10" fill="#f0883e" opacity="0.85">intent: create  ·  complexity: 4  ·  persist: true  ·  ~500 tokens</text>
  <text x="48" y="344" class="rf-sans" font-size="10" fill="#8b949e" opacity="0.6">LLM classifies 6 dimensions. Routes to cheapest capable path.</text>

  <line x1="452" y1="314" x2="468" y2="314" stroke="#f0883e" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <polygon points="464,310 474,314 464,318" fill="#f0883e" opacity="0.6"/>

  <rect x="476" y="292" width="166" height="44" rx="8" fill="#1c1108" stroke="#f0883e" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="559" y="310" class="rf-sans" font-size="11" fill="#f0883e" text-anchor="middle" font-weight="700" letter-spacing="2">TIER 3</text>
  <text x="559" y="326" class="rf-sans" font-size="10" fill="#f0883e" text-anchor="middle" opacity="0.7">LLM Classifier</text>

  <line x1="642" y1="314" x2="658" y2="314" stroke="#f0883e" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <polygon points="654,310 664,314 654,318" fill="#f0883e" opacity="0.6"/>

  <rect x="666" y="288" width="260" height="52" rx="8" fill="#1c1108" stroke="#f0883e" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="684" y="310" class="rf-sans" font-size="15" fill="#f0883e" font-weight="600">⬡  /archon</text>
  <text x="684" y="329" class="rf-sans" font-size="10" fill="#f0883e" opacity="0.65">multi-session campaign · self-correction</text>

  <circle class="rf-p3" cx="452" cy="314" r="5" fill="#f0883e" filter="url(#rf-g1)" opacity="0"/>
  <circle class="rf-r3" cx="796" cy="314" r="28" fill="none" stroke="#f0883e" stroke-width="1.5" opacity="0"/>


  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 4 — purple — Tier 3 — /fleet -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="362" width="1140" height="92" rx="0" fill="#1a122a" fill-opacity="0.4"/>

  <text x="48" y="398" class="rf-mono" font-size="15" fill="#79c0ff">"overhaul all three services"</text>
  <text x="48" y="419" class="rf-mono" font-size="10" fill="#bc8cff" opacity="0.85">intent: redesign  ·  scope: platform  ·  parallel: true  ·  ~500 tokens</text>
  <text x="48" y="436" class="rf-sans" font-size="10" fill="#8b949e" opacity="0.6">Platform-wide parallel execution across isolated git worktrees.</text>

  <line x1="452" y1="406" x2="468" y2="406" stroke="#bc8cff" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <polygon points="464,402 474,406 464,410" fill="#bc8cff" opacity="0.6"/>

  <rect x="476" y="384" width="166" height="44" rx="8" fill="#120c1c" stroke="#bc8cff" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="559" y="402" class="rf-sans" font-size="11" fill="#bc8cff" text-anchor="middle" font-weight="700" letter-spacing="2">TIER 3</text>
  <text x="559" y="418" class="rf-sans" font-size="10" fill="#bc8cff" text-anchor="middle" opacity="0.7">LLM Classifier</text>

  <line x1="642" y1="406" x2="658" y2="406" stroke="#bc8cff" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <polygon points="654,402 664,406 654,410" fill="#bc8cff" opacity="0.6"/>

  <rect x="666" y="380" width="260" height="52" rx="8" fill="#120c1c" stroke="#bc8cff" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="684" y="402" class="rf-sans" font-size="15" fill="#bc8cff" font-weight="600">⬢  /fleet</text>
  <text x="684" y="421" class="rf-sans" font-size="10" fill="#bc8cff" opacity="0.65">parallel agents · isolated git worktrees</text>

  <circle class="rf-p4" cx="452" cy="406" r="5" fill="#bc8cff" filter="url(#rf-g1)" opacity="0"/>
  <circle class="rf-r4" cx="796" cy="406" r="28" fill="none" stroke="#bc8cff" stroke-width="1.5" opacity="0"/>

  <!-- Bottom border -->
  <line x1="30" y1="455" x2="1170" y2="455" stroke="#21262d" stroke-width="1"/>
  <text x="600" y="471" class="rf-sans" font-size="11" fill="#4a5568" text-anchor="middle" letter-spacing="1">Simple tasks get simple tools. Complex tasks get campaigns. You never have to choose.</text>
</svg>
