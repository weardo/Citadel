<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="safety-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" rx="16" fill="url(#safety-bg)" stroke="#f0b429" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" fill="#8892b0" letter-spacing="3">SAFETY SYSTEMS</text>

  <!-- Item 1: Archon Self-Correction -->
  <g transform="translate(40, 65)">
    <rect x="0" y="0" width="270" height="200" rx="8" fill="#f0b429" fill-opacity="0.04" stroke="#f0b429" stroke-width="0.5" stroke-opacity="0.2"/>
    <!-- Shield icon -->
    <g transform="translate(135, 40)">
      <path d="M0,-20 L18,-10 L18,8 L0,20 L-18,8 L-18,-10 Z" fill="none" stroke="#f0b429" stroke-width="1.5" opacity="0.7"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" fill="#f0b429">A</text>
    </g>
    <text x="135" y="80" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#ffffff">Archon</text>
    <text x="135" y="96" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#ffffff">Self-Correction</text>
    <text x="135" y="125" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">Direction alignment every 2 phases</text>
    <text x="135" y="140" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">Quality spot-check every phase</text>
    <text x="135" y="155" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">Regression guard with escalation</text>
    <text x="135" y="170" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">Anti-pattern scan on build phases</text>
  </g>

  <!-- Item 2: Fleet Coordination -->
  <g transform="translate(330, 65)">
    <rect x="0" y="0" width="270" height="200" rx="8" fill="#00d2ff" fill-opacity="0.04" stroke="#00d2ff" stroke-width="0.5" stroke-opacity="0.2"/>
    <g transform="translate(135, 40)">
      <circle r="12" fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.7"/>
      <circle cx="-20" cy="12" r="8" fill="none" stroke="#00d2ff" stroke-width="1" opacity="0.4"/>
      <circle cx="20" cy="12" r="8" fill="none" stroke="#00d2ff" stroke-width="1" opacity="0.4"/>
    </g>
    <text x="135" y="80" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#ffffff">Fleet Coordination</text>
    <text x="135" y="96" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#ffffff">Safety</text>
    <text x="135" y="125" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">Instance IDs for every agent</text>
    <text x="135" y="140" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">Scope overlap detection</text>
    <text x="135" y="155" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">Dead instance recovery</text>
    <text x="135" y="170" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">Configurable agent timeouts</text>
  </g>

  <!-- Item 3: Agent Timeouts -->
  <g transform="translate(620, 65)">
    <rect x="0" y="0" width="270" height="200" rx="8" fill="#00d2ff" fill-opacity="0.04" stroke="#00d2ff" stroke-width="0.5" stroke-opacity="0.2"/>
    <g transform="translate(135, 35)">
      <circle r="16" fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.7"/>
      <line x1="0" y1="0" x2="0" y2="-10" stroke="#00d2ff" stroke-width="1.5" opacity="0.7"/>
      <line x1="0" y1="0" x2="8" y2="4" stroke="#00d2ff" stroke-width="1.5" opacity="0.7"/>
    </g>
    <text x="135" y="80" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#ffffff">Agent</text>
    <text x="135" y="96" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#ffffff">Timeouts</text>
    <text x="135" y="125" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">Skill agents: 10 minutes</text>
    <text x="135" y="140" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">Research scouts: 15 minutes</text>
    <text x="135" y="155" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">Build agents: 30 minutes</text>
    <text x="135" y="170" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">Configurable in harness.json</text>
  </g>

  <!-- Item 4: Dependency Linting -->
  <g transform="translate(910, 65)">
    <rect x="0" y="0" width="270" height="200" rx="8" fill="#f0b429" fill-opacity="0.04" stroke="#f0b429" stroke-width="0.5" stroke-opacity="0.2"/>
    <g transform="translate(135, 35)">
      <rect x="-14" y="-14" width="28" height="28" rx="4" fill="none" stroke="#f0b429" stroke-width="1.5" opacity="0.7"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#f0b429" stroke-width="2" opacity="0.7"/>
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#f0b429" stroke-width="2" opacity="0.7"/>
    </g>
    <text x="135" y="80" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#ffffff">Dependency-Aware</text>
    <text x="135" y="96" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#ffffff">Linting</text>
    <text x="135" y="125" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">Warns on raw fetch() with</text>
    <text x="135" y="140" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">tanstack query installed</text>
    <text x="135" y="155" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">Warnings, not blocks</text>
    <text x="135" y="170" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0">Zero cost when not configured</text>
  </g>
</svg>
