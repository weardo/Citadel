<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hero-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:1" />
    </linearGradient>
    <filter id="node-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#hero-bg)"/>

  <!-- Top accent line -->
  <rect x="40" y="16" width="1120" height="3" rx="1.5" fill="url(#hero-accent)" opacity="0.6"/>

  <!-- Title -->
  <text x="600" y="72" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#00d2ff" opacity="0.9" letter-spacing="6" font-weight="400">WAVE 3</text>
  <text x="600" y="112" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="2">App Creation Pipeline</text>

  <!-- Subtitle stats -->
  <text x="600" y="145" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="14" fill="#8892b0" letter-spacing="1">21 skills  |  5 tiers  |  spec to verified app</text>

  <!-- Pipeline visualization -->
  <!-- Connection lines -->
  <line x1="248" y1="260" x2="352" y2="260" stroke="#00d2ff" stroke-width="2" opacity="0.4"/>
  <line x1="448" y1="260" x2="552" y2="260" stroke="#00d2ff" stroke-width="2" opacity="0.4"/>
  <line x1="648" y1="260" x2="752" y2="260" stroke="#00d2ff" stroke-width="2" opacity="0.4"/>
  <line x1="848" y1="260" x2="952" y2="260" stroke="#00d2ff" stroke-width="2" opacity="0.4"/>

  <!-- Arrows on connection lines -->
  <polygon points="348,255 358,260 348,265" fill="#00d2ff" opacity="0.5"/>
  <polygon points="548,255 558,260 548,265" fill="#00d2ff" opacity="0.5"/>
  <polygon points="748,255 758,260 748,265" fill="#00d2ff" opacity="0.5"/>
  <polygon points="948,255 958,260 948,265" fill="#00d2ff" opacity="0.5"/>

  <!-- Node 1: Description -->
  <g transform="translate(200,260)" filter="url(#node-glow)">
    <circle r="44" fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.5"/>
    <circle r="32" fill="#1a1a2e" stroke="#00d2ff" stroke-width="2" opacity="0.8"/>
    <!-- Chat bubble icon -->
    <rect x="-14" y="-12" width="28" height="20" rx="4" fill="none" stroke="#00d2ff" stroke-width="1.5"/>
    <polygon points="-4,8 -8,16 2,8" fill="none" stroke="#00d2ff" stroke-width="1.5"/>
    <line x1="-8" y1="-4" x2="8" y2="-4" stroke="#00d2ff" stroke-width="1" opacity="0.6"/>
    <line x1="-8" y1="2" x2="4" y2="2" stroke="#00d2ff" stroke-width="1" opacity="0.6"/>
  </g>
  <text x="200" y="322" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600" fill="#ffffff">Description</text>
  <text x="200" y="340" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="11" fill="#8892b0">"build me a..."</text>

  <!-- Node 2: PRD -->
  <g transform="translate(400,260)" filter="url(#node-glow)">
    <circle r="44" fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.6"/>
    <circle r="32" fill="#1a1a2e" stroke="#00d2ff" stroke-width="2" opacity="0.8"/>
    <!-- Document icon -->
    <rect x="-12" y="-16" width="24" height="32" rx="2" fill="none" stroke="#00d2ff" stroke-width="1.5"/>
    <line x1="-6" y1="-8" x2="6" y2="-8" stroke="#00d2ff" stroke-width="1" opacity="0.6"/>
    <line x1="-6" y1="-2" x2="6" y2="-2" stroke="#00d2ff" stroke-width="1" opacity="0.6"/>
    <line x1="-6" y1="4" x2="6" y2="4" stroke="#00d2ff" stroke-width="1" opacity="0.6"/>
    <line x1="-6" y1="10" x2="2" y2="10" stroke="#00d2ff" stroke-width="1" opacity="0.6"/>
  </g>
  <text x="400" y="322" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600" fill="#ffffff">PRD</text>
  <text x="400" y="340" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="11" fill="#8892b0">/prd</text>

  <!-- Node 3: Architecture -->
  <g transform="translate(600,260)" filter="url(#node-glow)">
    <circle r="44" fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.7"/>
    <circle r="32" fill="#1a1a2e" stroke="#00d2ff" stroke-width="2" opacity="0.8"/>
    <!-- Blueprint/grid icon -->
    <rect x="-14" y="-14" width="28" height="28" rx="2" fill="none" stroke="#00d2ff" stroke-width="1.5"/>
    <line x1="-14" y1="-2" x2="14" y2="-2" stroke="#00d2ff" stroke-width="1" opacity="0.5"/>
    <line x1="-14" y1="8" x2="14" y2="8" stroke="#00d2ff" stroke-width="1" opacity="0.5"/>
    <line x1="-2" y1="-14" x2="-2" y2="14" stroke="#00d2ff" stroke-width="1" opacity="0.5"/>
    <line x1="8" y1="-14" x2="8" y2="14" stroke="#00d2ff" stroke-width="1" opacity="0.5"/>
  </g>
  <text x="600" y="322" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600" fill="#ffffff">Architecture</text>
  <text x="600" y="340" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="11" fill="#8892b0">/architect</text>

  <!-- Node 4: Build -->
  <g transform="translate(800,260)" filter="url(#node-glow)">
    <circle r="44" fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.8"/>
    <circle r="32" fill="#1a1a2e" stroke="#00d2ff" stroke-width="2" opacity="0.8"/>
    <!-- Hammer/build icon -->
    <rect x="-4" y="-16" width="8" height="24" rx="2" fill="none" stroke="#00d2ff" stroke-width="1.5"/>
    <rect x="-14" y="-16" width="28" height="10" rx="2" fill="none" stroke="#00d2ff" stroke-width="1.5"/>
    <line x1="0" y1="8" x2="0" y2="14" stroke="#00d2ff" stroke-width="2"/>
  </g>
  <text x="800" y="322" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600" fill="#ffffff">Build</text>
  <text x="800" y="340" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="11" fill="#8892b0">/archon</text>

  <!-- Node 5: Verify -->
  <g transform="translate(1000,260)" filter="url(#node-glow)">
    <circle r="44" fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.9"/>
    <circle r="32" fill="#1a1a2e" stroke="#00d2ff" stroke-width="2" opacity="0.8"/>
    <!-- Checkmark icon -->
    <polyline points="-12,0 -4,10 14,-12" fill="none" stroke="#00d2ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1000" y="322" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600" fill="#ffffff">Verify</text>
  <text x="1000" y="340" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="11" fill="#8892b0">end conditions</text>

  <!-- Bottom accent line -->
  <rect x="40" y="381" width="1120" height="3" rx="1.5" fill="url(#hero-accent)" opacity="0.4"/>
</svg>
