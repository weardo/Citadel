<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="pipe-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pipe-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:1" />
    </linearGradient>
    <filter id="pipe-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#pipe-bg)"/>

  <!-- Top accent line -->
  <rect x="40" y="14" width="1120" height="3" rx="1.5" fill="url(#pipe-accent)" opacity="0.6"/>

  <!-- Section title -->
  <text x="600" y="52" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#00d2ff" opacity="0.9" letter-spacing="4">THE PIPELINE</text>

  <!-- Connection lines -->
  <line x1="260" y1="140" x2="380" y2="140" stroke="#00d2ff" stroke-width="2" opacity="0.3"/>
  <line x1="560" y1="140" x2="680" y2="140" stroke="#00d2ff" stroke-width="2" opacity="0.3"/>
  <line x1="860" y1="140" x2="980" y2="140" stroke="#00d2ff" stroke-width="2" opacity="0.3"/>

  <!-- Arrows -->
  <polygon points="376,135 386,140 376,145" fill="#00d2ff" opacity="0.4"/>
  <polygon points="676,135 686,140 676,145" fill="#00d2ff" opacity="0.4"/>
  <polygon points="976,135 986,140 976,145" fill="#00d2ff" opacity="0.4"/>

  <!-- Node 1: /prd -->
  <g transform="translate(170,140)" filter="url(#pipe-glow)">
    <rect x="-80" y="-42" width="160" height="84" rx="10" fill="#1a1a2e" stroke="#00d2ff" stroke-width="1.5" opacity="0.7"/>
    <text y="-8" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="20" font-weight="700" fill="#00d2ff">/prd</text>
    <text y="16" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#8892b0">requirements</text>
  </g>
  <!-- Output label -->
  <text x="170" y="210" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="11" fill="#8892b0" opacity="0.7">prd-{slug}.md</text>
  <text x="170" y="228" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0" opacity="0.5">features, scope, end conditions</text>

  <!-- Node 2: /architect -->
  <g transform="translate(470,140)" filter="url(#pipe-glow)">
    <rect x="-80" y="-42" width="160" height="84" rx="10" fill="#1a1a2e" stroke="#00d2ff" stroke-width="1.5" opacity="0.7"/>
    <text y="-8" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="20" font-weight="700" fill="#00d2ff">/architect</text>
    <text y="16" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#8892b0">planning</text>
  </g>
  <text x="470" y="210" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="11" fill="#8892b0" opacity="0.7">architecture-{slug}.md</text>
  <text x="470" y="228" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0" opacity="0.5">file tree, phases, decisions</text>

  <!-- Node 3: /archon -->
  <g transform="translate(770,140)" filter="url(#pipe-glow)">
    <rect x="-80" y="-42" width="160" height="84" rx="10" fill="#1a1a2e" stroke="#00d2ff" stroke-width="1.5" opacity="0.7"/>
    <text y="-8" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="20" font-weight="700" fill="#00d2ff">/archon</text>
    <text y="16" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#8892b0">execution</text>
  </g>
  <text x="770" y="210" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="11" fill="#8892b0" opacity="0.7">campaign-{slug}.md</text>
  <text x="770" y="228" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0" opacity="0.5">phased build, self-correction</text>

  <!-- Node 4: verify -->
  <g transform="translate(1070,140)" filter="url(#pipe-glow)">
    <rect x="-80" y="-42" width="160" height="84" rx="10" fill="#1a1a2e" stroke="#00d2ff" stroke-width="1.5" opacity="0.7"/>
    <text y="-8" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="20" font-weight="700" fill="#00d2ff">verify</text>
    <text y="16" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#8892b0">acceptance</text>
  </g>
  <text x="1070" y="210" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="11" fill="#8892b0" opacity="0.7">verified app</text>
  <text x="1070" y="228" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0" opacity="0.5">all end conditions pass</text>

  <!-- Bottom accent line -->
  <rect x="40" y="283" width="1120" height="3" rx="1.5" fill="url(#pipe-accent)" opacity="0.4"/>
</svg>
